services:
  - type: web
    name: approval-portal-creches
    runtime: node
    buildCommand: npm install
    startCommand: node server.js
    plan: free
    autoDeploy: true
    healthCheckPath: /login
    envVars:
      - key: NODE_ENV
        value: production

      # Shopify — à renseigner dans le dashboard Render
      - key: SHOPIFY_SHOP
        sync: false
      - key: SHOPIFY_ACCESS_TOKEN
        sync: false

      # Portail — à renseigner dans le dashboard Render
      - key: PORTAL_PASSWORD
        sync: false

      # Session — générée automatiquement par Render
      - key: SESSION_SECRET
        generateValue: true

      # Base de données — OBLIGATOIRE, à créer manuellement dans le dashboard Render :
      # New +  →  PostgreSQL  →  plan Free  →  puis copier son "Internal Database URL"
      # dans la variable DATABASE_URL de ce service (dashboard Render → Environment).
      # Voir SETUP.md pour la marche à suivre complète.
      # Le stockage sur disque local (db/*.json) est éphémère sur le plan free
      # de Render : il est réinitialisé à chaque redéploiement/redémarrage.
      - key: DATABASE_URL
        sync: false

      # Email SMTP — optionnel, à renseigner dans le dashboard Render
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_SECURE
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: NOTIFICATION_EMAIL
        sync: false
